services:

  # ── Elasticsearch ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: es-node
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      # Lucene 세그먼트가 OS Page Cache를 최대한 활용하려면
      # 힙을 RAM 50% 이하로 제한하는 것이 핵심 (Ch6-03 참고)
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"   # REST API
      - "9300:9300"   # 노드 간 Transport (클러스터 통신)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Kibana ────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"   # Kibana Dev Tools — 모든 실험은 여기서
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── Elasticsearch Exporter (Prometheus 메트릭) ─────────────────
  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:latest
    container_name: es-exporter
    depends_on:
      elasticsearch:
        condition: service_healthy
    command:
      - '--es.uri=http://elasticsearch:9200'
      - '--es.all'           # 모든 인덱스 메트릭 수집
      - '--es.indices'       # 인덱스별 통계
      - '--es.shards'        # 샤드별 통계 (Ch1-03 샤드 분석에 유용)
    ports:
      - "9114:9114"   # Prometheus scrape endpoint

  # ── Prometheus ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    depends_on:
      - elasticsearch-exporter
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  # ── Grafana ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3000:3000"   # admin / admin 으로 접속

volumes:
  esdata:
  prometheusdata:
  grafanadata: